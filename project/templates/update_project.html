<!DOCTYPE html>
<html>
<head>
    <title>Update Project</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');

        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            margin: 0;
            padding: 40px;
            color: #333;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        h2 {
            font-size: 32px;
            color: #2c3e50;
            margin-top: 0;
            margin-bottom: 25px;
            font-weight: 700;
        }

        .nav {
            margin-bottom: 35px;
            display: flex;
            justify-content: center;
            gap: 15px;
        }

        .nav a {
            padding: 12px 24px;
            background: #ffffff;
            color: #4a90e2;
            text-decoration: none;
            border-radius: 8px;
            font-weight: 600;
            transition: all 0.3s ease;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
            border: 1px solid #e1e8ed;
        }

        .nav a:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 12px rgba(74, 144, 226, 0.15);
            background: #4a90e2;
            color: white;
        }

        .container {
            width: 100%;
            max-width: 480px;
            background: rgba(255, 255, 255, 0.95);
            padding: 40px;
            border-radius: 16px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            backdrop-filter: blur(10px);
            text-align: center;
        }

        input[type="text"], 
        textarea {
            width: 100%;
            padding: 14px 16px;
            margin: 10px 0 20px;
            border-radius: 8px;
            border: 1px solid #e2e8f0;
            background: #f8fafc;
            font-family: 'Inter', sans-serif;
            font-size: 15px;
            color: #2d3748;
            box-sizing: border-box;
            transition: all 0.2s ease;
        }

        input[type="text"]:focus, 
        textarea:focus {
            outline: none;
            border-color: #f6ad55;
            background: #ffffff;
            box-shadow: 0 0 0 3px rgba(246, 173, 85, 0.2);
        }

        textarea {
            height: 120px;
            resize: vertical;
        }

        input[type="file"] {
            width: 100%;
            padding: 12px;
            margin: 10px 0 20px;
            border-radius: 8px;
            border: 1px dashed #cbd5e0;
            background: #f8fafc;
            font-family: 'Inter', sans-serif;
            color: #4a5568;
            box-sizing: border-box;
            cursor: pointer;
        }

        .current-file {
            text-align: left;
            margin-bottom: 20px;
            font-size: 14px;
            color: #4a5568;
            background: #e2e8f0;
            padding: 10px;
            border-radius: 6px;
        }

        button {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #f6d365 0%, #fda085 100%);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 10px rgba(253, 160, 133, 0.3);
            margin-top: 10px;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 15px rgba(253, 160, 133, 0.4);
        }
    </style>
</head>
<body>

<h2> Update Film Project</h2>

<div class="nav">
    <a href="/home/"> Home</a>
    <a href="/dashboard/"> Dashboard</a>
    <a href="/logout/"> Logout</a>
</div>

<div class="container">
<form method="post" enctype="multipart/form-data">
{% csrf_token %}

<input type="text" name="title" value="{{ project.title }}" placeholder="Project Title" required>
<input type="text" name="genre" value="{{ project.genre }}" placeholder="Genre" required>
<input type="text" name="director" value="{{ project.director }}" placeholder="Director" required>

<input type="text" name="written_by" value="{{ project.written_by|default_if_none:'' }}" placeholder="Written By (Optional)">
<input type="text" name="cinematography" value="{{ project.cinematography|default_if_none:'' }}" placeholder="Cinematography (Optional)">
<input type="text" name="edited_by" value="{{ project.edited_by|default_if_none:'' }}" placeholder="Edited By (Optional)">
<input type="text" name="music_by" value="{{ project.music_by|default_if_none:'' }}" placeholder="Music By (Optional)">

<label style="display:block; text-align:left; color:#4a5568; font-weight:500; font-size:14px; margin-bottom:5px;">Release Date:</label>
<input type="date" name="release_date" value="{{ project.release_date|date:'Y-m-d'|default_if_none:'' }}" style="width: 100%; padding: 14px 16px; margin: 0 0 20px; border-radius: 8px; border: 1px solid #e2e8f0; background: #f8fafc; font-family: 'Inter', sans-serif; font-size: 15px; color: #2d3748; box-sizing: border-box;">

<input type="text" name="language" value="{{ project.language|default_if_none:'' }}" placeholder="Language (Optional)">
<label style="display:block; text-align:left; color:#4a5568; font-weight:500; font-size:14px; margin-bottom:5px;">Running Time (hr:min:ss):</label>
<div style="display: flex; gap: 10px; margin-bottom: 20px;">
    <select id="rt-hours" required style="flex: 1; padding: 14px 16px; border-radius: 8px; border: 1px solid #e2e8f0; background: #f8fafc; font-family: 'Inter', sans-serif; font-size: 15px; color: #2d3748; outline: none; cursor: pointer;">
        <option value="" disabled selected>Hr</option>
        <option value="00">00</option><option value="01">01</option><option value="02">02</option>
        <option value="03">03</option><option value="04">04</option><option value="05">05</option>
        <option value="06">06</option><option value="07">07</option><option value="08">08</option>
        <option value="09">09</option><option value="10">10</option>
    </select>
    <select id="rt-minutes" required style="flex: 1; padding: 14px 16px; border-radius: 8px; border: 1px solid #e2e8f0; background: #f8fafc; font-family: 'Inter', sans-serif; font-size: 15px; color: #2d3748; outline: none; cursor: pointer;">
        <option value="" disabled selected>Min</option>
    </select>
    <select id="rt-seconds" required style="flex: 1; padding: 14px 16px; border-radius: 8px; border: 1px solid #e2e8f0; background: #f8fafc; font-family: 'Inter', sans-serif; font-size: 15px; color: #2d3748; outline: none; cursor: pointer;">
        <option value="" disabled selected>Sec</option>
    </select>
</div>
<input type="hidden" name="running_time" id="running_time_input" value="{{ project.running_time|default_if_none:'' }}" required>

<script>
    document.addEventListener("DOMContentLoaded", function() {
        const minSecOptions = Array.from({length: 60}, (_, i) => `<option value="${String(i).padStart(2, '0')}">${String(i).padStart(2, '0')}</option>`).join('');
        document.getElementById('rt-minutes').innerHTML += minSecOptions;
        document.getElementById('rt-seconds').innerHTML += minSecOptions;

        const existingTime = document.getElementById('running_time_input').value;
        if (existingTime) {
            const parts = existingTime.split(':');
            if (parts.length === 3) {
                document.getElementById('rt-hours').value = parts[0];
                document.getElementById('rt-minutes').value = parts[1];
                document.getElementById('rt-seconds').value = parts[2];
            }
        }

        function updateRunningTime() {
            const h = document.getElementById('rt-hours').value;
            const m = document.getElementById('rt-minutes').value;
            const s = document.getElementById('rt-seconds').value;
            if (h && m && s) {
                document.getElementById('running_time_input').value = `${h}:${m}:${s}`;
            }
        }

        document.getElementById('rt-hours').addEventListener('change', updateRunningTime);
        document.getElementById('rt-minutes').addEventListener('change', updateRunningTime);
        document.getElementById('rt-seconds').addEventListener('change', updateRunningTime);
    });
</script>

{% if project.script %}
<div class="current-file">
    <strong>Current Script:</strong> <a href="{{ project.script.url }}" target="_blank">{{ project.script.name }}</a>
</div>
{% endif %}
<label style="display:block; text-align:left; color:#4a5568; font-weight:500; font-size:14px; margin-bottom:5px;">Script PDF:</label>
<input type="file" name="script" accept=".pdf">

{% if project.image %}
<div class="current-file">
    <strong>Current Image:</strong> <img src="{{ project.image.url }}" alt="{{ project.title }}" style="max-width: 100px; max-height: 100px; display: block; margin-top: 5px; border-radius: 4px;">
</div>
{% endif %}
<label style="display:block; text-align:left; color:#4a5568; font-weight:500; font-size:14px; margin-bottom:5px;">Cover Image:</label>
<input type="file" name="image" accept="image/*">

<textarea name="description" placeholder="Description" required>{{ project.description }}</textarea>

<button type="submit"> Update Project</button>

</form>
</div>

</body>
</html>
