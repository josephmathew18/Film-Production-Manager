<!DOCTYPE html>
<html>
<head>
    <title>Add Scene to {{ project.title }}</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');

        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            margin: 0;
            padding: 40px;
            color: #333;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        h2 {
            font-size: 32px;
            color: #2c3e50;
            margin-top: 0;
            margin-bottom: 25px;
            font-weight: 700;
        }

        .nav {
            margin-bottom: 35px;
            display: flex;
            justify-content: center;
            gap: 15px;
        }

        .nav a {
            padding: 12px 24px;
            background: #ffffff;
            color: #4a90e2;
            text-decoration: none;
            border-radius: 8px;
            font-weight: 600;
            transition: all 0.3s ease;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
            border: 1px solid #e1e8ed;
        }

        .nav a:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 12px rgba(74, 144, 226, 0.15);
            background: #4a90e2;
            color: white;
        }

        .container {
            width: 100%;
            max-width: 500px;
            background: rgba(255, 255, 255, 0.95);
            padding: 40px;
            border-radius: 16px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            backdrop-filter: blur(10px);
            text-align: center;
        }

        input[type="text"], input[type="number"], select, textarea {
            width: 100%;
            padding: 14px 16px;
            margin: 10px 0 20px;
            border-radius: 8px;
            border: 1px solid #e2e8f0;
            background: #f8fafc;
            font-family: 'Inter', sans-serif;
            font-size: 15px;
            color: #2d3748;
            box-sizing: border-box;
            transition: all 0.2s ease;
        }

        input[type="text"]:focus, input[type="number"]:focus, select:focus, textarea:focus {
            outline: none;
            border-color: #4a90e2;
            background: #ffffff;
            box-shadow: 0 0 0 3px rgba(74, 144, 226, 0.2);
        }

        textarea {
            height: 100px;
            resize: vertical;
        }
        
        select[multiple] {
            height: 120px;
        }

        label {
            display: block;
            text-align: left;
            font-weight: 600;
            font-size: 14px;
            color: #4a5568;
            margin-bottom: -5px;
        }

        button {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #11998e 0%, #38ef7d 100%);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 10px rgba(56, 239, 125, 0.3);
            margin-top: 10px;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 15px rgba(56, 239, 125, 0.4);
        }
    </style>
</head>
<body>

{% if project %}
<h2>🎬 Add Scene To {{ project.title }}</h2>
{% else %}
<h2>🎬 Add Scene</h2>
{% endif %}

<div class="nav">
    {% if project %}
    <a href="/project/{{ project.id }}/">⬅️ Back to {{ project.title }}</a>
    {% endif %}
    <a href="/home/">🏠 Projects</a>
    <a href="/dashboard/">📊 Dashboard</a>
</div>

<div class="container">
<form method="post">
{% csrf_token %}

{% if not project %}
<label>Project</label>
<select name="project" required>
    <option value="" disabled selected>Select Project</option>
    {% for p in projects %}
    <option value="{{ p.id }}">{{ p.title }}</option>
    {% endfor %}
</select>
{% endif %}

<label>Scene Title</label>
<input type="text" name="title" placeholder="E.g., Opening Monologue" required>

<label>Description</label>
<textarea name="description" placeholder="Brief outline of the scene" required></textarea>

<label>Location</label>
<input type="text" name="location" placeholder="E.g., Coffee Shop, Interior" required>

<label>Estimated Duration (Minutes)</label>
<input type="number" name="duration" placeholder="E.g., 5" required>

<label>Status</label>
<select name="status">
    <option value="pending">Pending</option>
    <option value="completed">Completed</option>
</select>

<label>Cast Needed (Hold Ctrl/Cmd to select multiple)</label>
<select name="actors" multiple>
    {% for a in actors %}
        <option value="{{ a.id }}">{{ a.name }} ({{ a.role }})</option>
    {% empty %}
        <option value="" disabled>No actors created yet</option>
    {% endfor %}
</select>

<button type="submit">💾 Save Scene</button>

</form>
</div>

</body>
</html>
